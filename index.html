<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ONCE HQ — A TWICE Fan Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  #hero{
    position:relative;
    height:calc(100vh - 73px);
    min-height:560px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:radial-gradient(circle at 50% 20%, var(--plum) 0%, var(--plum-deep) 70%);
  }
  #hero-canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .hero-content{ position:relative; z-index:2; text-align:center; padding:0 20px; pointer-events:none; }
  .hero-content .eyebrow{ opacity:0; animation:fadeUp 1s ease forwards 0.2s; }
  .logo-text{
    font-family:'Pacifico', cursive;
    font-size:clamp(4rem, 14vw, 9rem);
    line-height:1;
    background:linear-gradient(120deg, var(--coral) 10%, var(--peach) 50%, var(--gold) 90%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 8px 30px rgba(255,111,145,0.35));
    opacity:0; animation:fadeUp 1.1s ease forwards 0.5s;
  }
  .tagline{
    margin-top:22px; font-size:clamp(0.95rem, 2vw, 1.2rem); font-weight:300;
    opacity:0; animation:fadeUp 1s ease forwards 0.9s;
  }
  .tagline strong{ color:var(--peach); font-weight:600; }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(24px);} to{ opacity:1; transform:translateY(0);} }
  .scroll-cue{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; opacity:0.6; z-index:2;
    animation:bob 2.4s ease-in-out infinite;
  }
  @keyframes bob{ 0%,100%{ transform:translate(-50%,0);} 50%{ transform:translate(-50%,8px);} }
  @media (prefers-reduced-motion: reduce){
    .logo-text, .hero-content .eyebrow, .tagline, .scroll-cue{ animation:none !important; opacity:1 !important; }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">TWICE</a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html" class="active">Home</a></li>
    <li><a href="members.html">Members</a></li>
    <li><a href="exclusive.html">Exclusive</a></li>
    <li id="nav-auth-slot"><a class="nav-cta" href="login.html">Log in</a></li>
  </ul>
  <button class="nav-toggle" id="nav-toggle">&#9776;</button>
</nav>

<main>
  <section id="hero">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-content">
      <div class="eyebrow">ONCE, forever with us</div>
      <h1 class="logo-text">TWICE</h1>
      <p class="tagline">Nine voices, <strong>one heartbeat</strong>. A fan tribute in motion.</p>
    </div>
    <div class="scroll-cue">scroll ↓</div>
  </section>
</main>

<footer>
  Fan-made tribute site · not affiliated with JYP Entertainment · built with Three.js
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  const canvas = document.getElementById('hero-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 14);

  function resize(){
    const w = canvas.parentElement.clientWidth;
    const h = canvas.parentElement.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const pinkLight = new THREE.PointLight(0xff6f91, 3, 40);
  pinkLight.position.set(-6, 4, 6);
  scene.add(pinkLight);
  const goldLight = new THREE.PointLight(0xffd166, 2.5, 40);
  goldLight.position.set(6, -3, 6);
  scene.add(goldLight);

  const particleCount = 260;
  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);
  const palette = [new THREE.Color(0xff6f91), new THREE.Color(0xffb37b), new THREE.Color(0xffd166)];

  for(let i=0; i<particleCount; i++){
    positions[i*3]   = (Math.random()-0.5) * 30;
    positions[i*3+1] = (Math.random()-0.5) * 18;
    positions[i*3+2] = (Math.random()-0.5) * 20 - 4;
    const c = palette[Math.floor(Math.random()*palette.length)];
    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
  }

  const particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const particleMat = new THREE.PointsMaterial({ size:0.14, vertexColors:true, transparent:true, opacity:0.85, depthWrite:false });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  const ribbonGeo = new THREE.TorusKnotGeometry(3.1, 0.28, 180, 24, 2, 3);
  const ribbonMat = new THREE.MeshStandardMaterial({ color:0xffffff, metalness:0.3, roughness:0.25, emissive:0xff6f91, emissiveIntensity:0.15 });
  const ribbon = new THREE.Mesh(ribbonGeo, ribbonMat);
  ribbon.position.set(0, -0.5, -3);
  ribbon.scale.set(0.9, 0.9, 0.9);
  scene.add(ribbon);

  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5);
    mouseY = (e.clientY / window.innerHeight - 0.5);
  });

  const clock = new THREE.Clock();
  function animate(){
    const t = clock.getElapsedTime();
    ribbon.rotation.x = t * 0.15;
    ribbon.rotation.y = t * 0.22;
    particles.rotation.y = t * 0.02;
    particles.rotation.x = Math.sin(t * 0.05) * 0.05;
    camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
    camera.position.y += (-mouseY * 1.2 - camera.position.y) * 0.02;
    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();
</script>

</body>
</html>
