<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Members — ONCE HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">TWICE</a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="members.html" class="active">Members</a></li>
    <li><a href="exclusive.html">Exclusive</a></li>
    <li id="nav-auth-slot"><a class="nav-cta" href="login.html">Log in</a></li>
  </ul>
  <button class="nav-toggle" id="nav-toggle">&#9776;</button>
</nav>

<main>
  <div class="page-header">
    <div class="eyebrow">The Lineup</div>
    <h1>Meet the Members</h1>
  </div>

  <div class="member-grid" id="member-grid"><!-- cards injected by JS --></div>
</main>

<footer>
  Fan-made tribute site · not affiliated with JYP Entertainment · built with Three.js
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/members-data.js"></script>
<script>
  const grid = document.getElementById('member-grid');

  MEMBERS.forEach(member => {
    const photos = getMemberPhotos(member.id);

    const card = document.createElement('div');
    card.className = 'member-card';
    card.dataset.id = member.id;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="photo-slideshow">
            ${photos.map((src, i) => `<img class="slide${i === 0 ? ' active' : ''}" src="${src}" alt="${member.name}" data-slide-index="${i}">`).join('')}
            <div class="slide-fallback">${member.initial}</div>
            <div class="slide-dots">
              ${photos.map((_, i) => `<span class="${i === 0 ? 'active' : ''}"></span>`).join('')}
            </div>
          </div>
          <div class="card-info">
            <div class="member-name">${member.name}</div>
            <div class="member-role">${member.role}</div>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="back-content">
            <h3>${member.name}</h3>
            <p>${member.summary}</p>
            <span class="back-hint">Double-click for full profile →</span>
          </div>
        </div>
      </div>
    `;

    // Hide any <img> that fails to load (keeps the gradient fallback letter visible instead)
    card.querySelectorAll('.slide').forEach(img => {
      img.addEventListener('error', () => { img.style.display = 'none'; });
    });

    // Hover slideshow: cycle through available slides while the mouse is over the card
    let slideTimer = null;
    let slideIndex = 0;
    const slides = card.querySelectorAll('.slide');
    const dots = card.querySelectorAll('.slide-dots span');

    function showSlide(i){
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach(d => d.classList.remove('active'));
      if(slides[i]) slides[i].classList.add('active');
      if(dots[i]) dots[i].classList.add('active');
    }

    card.addEventListener('mouseenter', () => {
      if(slides.length <= 1) return;
      slideTimer = setInterval(() => {
        slideIndex = (slideIndex + 1) % slides.length;
        showSlide(slideIndex);
      }, 1100);
    });

    card.addEventListener('mouseleave', () => {
      clearInterval(slideTimer);
      slideIndex = 0;
      showSlide(0);
    });

    // Single click = flip, double click = go to detail page.
    // e.detail tells us how many clicks happened in quick succession (browser-native,
    // more reliable than a manual counter): 1 = single click, 2 = second click of a dblclick.
    let clickTimer = null;

    card.addEventListener('click', (e) => {
      if(e.detail >= 2){
        clearTimeout(clickTimer);
        window.location.href = `member.html?id=${member.id}`;
        return;
      }
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => {
        card.classList.toggle('flipped');
      }, 300);
    });

    // Prevent the double-click from selecting text on the card
    card.addEventListener('mousedown', (e) => {
      if(e.detail > 1) e.preventDefault();
    });

    grid.appendChild(card);
  });
</script>
</body>
</html>
