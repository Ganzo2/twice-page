<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log In — ONCE HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">TWICE</a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="members.html">Members</a></li>
    <li><a href="exclusive.html">Exclusive</a></li>
    <li id="nav-auth-slot"><a class="nav-cta" href="login.html" class="active">Log in</a></li>
  </ul>
  <button class="nav-toggle" id="nav-toggle">&#9776;</button>
</nav>

<main>
  <div class="page-header">
    <div class="eyebrow" id="form-eyebrow">Welcome Back</div>
    <h1 id="form-title">Log In</h1>
    <p>Sign in to unlock the exclusive members-only area.</p>
  </div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-message" id="auth-message"></div>

      <form id="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" minlength="6" />
        </div>
        <button type="submit" class="auth-submit" id="auth-submit-btn">Log In</button>
      </form>

      <div class="auth-switch">
        <span id="switch-prompt">Don't have an account?</span>
        <button type="button" id="switch-mode-btn">Sign up</button>
      </div>
    </div>
  </div>
</main>

<footer>
  Fan-made tribute site · not affiliated with JYP Entertainment · built with Three.js
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  let mode = 'login'; // or 'signup'

  const form = document.getElementById('auth-form');
  const messageEl = document.getElementById('auth-message');
  const submitBtn = document.getElementById('auth-submit-btn');
  const switchBtn = document.getElementById('switch-mode-btn');
  const switchPrompt = document.getElementById('switch-prompt');
  const formTitle = document.getElementById('form-title');
  const formEyebrow = document.getElementById('form-eyebrow');

  // If already logged in, skip straight to the exclusive page
  auth.onAuthStateChanged((user) => {
    if(user) window.location.href = 'exclusive.html';
  });

  switchBtn.addEventListener('click', () => {
    mode = mode === 'login' ? 'signup' : 'login';
    if(mode === 'signup'){
      formTitle.textContent = 'Sign Up';
      formEyebrow.textContent = 'Join ONCE HQ';
      submitBtn.textContent = 'Create Account';
      switchPrompt.textContent = 'Already have an account?';
      switchBtn.textContent = 'Log in';
    } else {
      formTitle.textContent = 'Log In';
      formEyebrow.textContent = 'Welcome Back';
      submitBtn.textContent = 'Log In';
      switchPrompt.textContent = "Don't have an account?";
      switchBtn.textContent = 'Sign up';
    }
    messageEl.textContent = '';
    messageEl.className = 'auth-message';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    messageEl.textContent = '';
    messageEl.className = 'auth-message';
    submitBtn.disabled = true;

    const action = mode === 'signup'
      ? auth.createUserWithEmailAndPassword(email, password)
      : auth.signInWithEmailAndPassword(email, password);

    action
      .then(() => {
        messageEl.textContent = mode === 'signup' ? 'Account created! Redirecting…' : 'Logged in! Redirecting…';
        messageEl.className = 'auth-message success';
        setTimeout(() => { window.location.href = 'exclusive.html'; }, 600);
      })
      .catch((err) => {
        messageEl.textContent = err.message.replace('Firebase: ', '');
        messageEl.className = 'auth-message error';
        submitBtn.disabled = false;
      });
  });
</script>
</body>
</html>
